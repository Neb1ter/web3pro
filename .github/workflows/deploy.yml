name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to Baidu Cloud Windows Server
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (Vite)
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Build backend (esbuild)
        run: npx esbuild server/_core/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist
        env:
          NODE_ENV: production

      - name: Package deployment bundle for transfer
        run: |
          tar -czf deploy-bundle.tar.gz dist ecosystem.config.cjs services/codex-business
          echo "Package size: $(du -sh deploy-bundle.tar.gz | cut -f1)"

      - name: Prepare runtime override env
        run: |
          printf '%s\n' "${{ secrets.SERVER_ENV_OVERRIDE }}" > runtime.override.env
          echo "Runtime override env prepared"

      - name: Install SSH tools
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Prepare remote deployment directory
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          REMOTE_PREP="powershell -NoProfile -Command \"New-Item -ItemType Directory -Force -Path 'C:\\web3pro' | Out-Null\""
          sshpass -p "$SERVER_PASSWORD" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=6 \
            -p 22 \
            "$SERVER_USER@$SERVER_HOST" \
            "$REMOTE_PREP"

      - name: Upload deployment bundle to server via SCP
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          REMOTE_BUNDLE="C:/web3pro/deploy-bundle.tar.gz"
          REMOTE_ENV="C:/web3pro/runtime.override.env"

          for attempt in 1 2 3; do
            echo "SCP attempt $attempt"
            if sshpass -p "$SERVER_PASSWORD" scp \
              -O \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=20 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=6 \
              -P 22 \
              deploy-bundle.tar.gz \
              "$SERVER_USER@$SERVER_HOST:$REMOTE_BUNDLE" && \
              sshpass -p "$SERVER_PASSWORD" scp \
              -O \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=20 \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=6 \
              -P 22 \
              runtime.override.env \
              "$SERVER_USER@$SERVER_HOST:$REMOTE_ENV"; then
              echo "Upload completed"
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Upload failed after 3 attempts"
              exit 1
            fi

            sleep 20
          done

      - name: Deploy on server via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          REMOTE_DEPLOY=$(cat <<'EOF'
          powershell -NoProfile -Command "$ErrorActionPreference='Stop'; Set-Location 'C:\web3pro'; tar -xzf 'deploy-bundle.tar.gz'; Remove-Item -Force 'deploy-bundle.tar.gz'; if (Test-Path 'runtime.override.env') { Copy-Item 'runtime.override.env' '.env.runtime' -Force }; npx pm2 delete codexbiuness 2>$null; npx pm2 startOrReload ecosystem.config.cjs --update-env; npx pm2 save"
          EOF
          )

          for attempt in 1 2 3; do
            echo "SSH deploy attempt $attempt"
            if sshpass -p "$SERVER_PASSWORD" ssh \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ServerAliveInterval=15 \
              -o ServerAliveCountMax=6 \
              -p 22 \
              "$SERVER_USER@$SERVER_HOST" \
              "$REMOTE_DEPLOY"; then
              echo "Remote deploy completed"
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Remote deploy failed after 3 attempts"
              exit 1
            fi

            sleep 20
          done

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | python3 -c "import sys,json; r=json.load(sys.stdin); print('Cloudflare cache purged OK' if r.get('success') else 'Cache purge failed: ' + str(r))"

      - name: Verify deployment
        run: |
          sleep 25
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 15 "https://get8.pro/")
          CODEX_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 15 "https://get8.pro/codex-business/app/api/health")
          echo "HTTP Status: $STATUS"
          echo "Codex Business Status: $CODEX_STATUS"
          ONLINE_REACT=$(curl -s https://get8.pro/ | grep -oP 'vendor-react-[a-zA-Z0-9_-]+\.js' | head -1)
          echo "Online vendor-react: $ONLINE_REACT"
          if [ "$STATUS" = "200" ] && [ "$CODEX_STATUS" = "200" ]; then
            echo "Deployment successful"
          else
            echo "Deployment may have issues, status: $STATUS, codex: $CODEX_STATUS"
            exit 1
          fi
