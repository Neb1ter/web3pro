name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Baidu Cloud Windows Server
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          command_timeout: 10m
          script_stop: true
          script: |
            cd C:\web3pro
            git fetch origin
            git reset --hard origin/main
            pnpm install --frozen-lockfile
            pnpm run build
            npx pm2 restart ecosystem.config.cjs
            npx pm2 save

      - name: Verify deployment
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 15 "https://get8.pro/" )
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ Deployment successful!"
          else
            echo "⚠️ Status: $STATUS - may need manual check"
          fi
