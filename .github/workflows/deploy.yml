name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to Baidu Cloud Windows Server
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (Vite)
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Build backend (esbuild)
        run: npx esbuild server/_core/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist
        env:
          NODE_ENV: production

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script_stop: true
          script: >
            powershell.exe -NoProfile -ExecutionPolicy Bypass -Command "& {
            $ErrorActionPreference = 'Stop';
            $repoPath = 'C:\web3pro';
            if (-not (Test-Path $repoPath)) { New-Item -ItemType Directory -Path $repoPath | Out-Null };
            Set-Location $repoPath;
            if (-not (Test-Path '.git')) { git init | Out-Null };
            $remotes = @(git remote);
            if ($remotes -contains 'origin') { git remote remove origin };
            git remote add origin 'https://github.com/Neb1ter/web3pro.git';
            git fetch origin main --depth=1;
            git reset --hard origin/main;
            if (-not (Test-Path '.env.runtime') -and -not (Test-Path '.env')) { Write-Host 'Warning: .env.runtime and .env are both missing on server' };
            corepack enable;
            pnpm install --frozen-lockfile;
            pnpm run build;
            npx pm2 startOrReload ecosystem.config.cjs --update-env;
            npx pm2 save;
            }"

      - name: Inspect runtime on server
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script_stop: false
          script: >
            powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\web3pro\scripts\diagnose-runtime.ps1"

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | python3 -c "import sys,json; r=json.load(sys.stdin); print('Cloudflare cache purged OK' if r.get('success') else 'Cache purge failed: ' + str(r))"

      - name: Verify deployment
        run: |
          sleep 25
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 15 "https://get8.pro/")
          CODEX_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 15 "https://get8.pro/codex-business/app/api/health")
          echo "HTTP Status: $STATUS"
          echo "Codex Business Status: $CODEX_STATUS"
          ONLINE_REACT=$(curl -s https://get8.pro/ | grep -oP 'vendor-react-[a-zA-Z0-9_-]+\.js' | head -1)
          echo "Online vendor-react: $ONLINE_REACT"
          if [ "$STATUS" = "200" ] && [ "$CODEX_STATUS" = "200" ]; then
            echo "Deployment successful"
          else
            echo "Deployment may have issues, status: $STATUS, codex: $CODEX_STATUS"
            exit 1
          fi
