name: Deploy to Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build & Deploy to Baidu Cloud Windows Server
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (Vite)
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Build backend (esbuild)
        run: npx esbuild server/_core/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist
        env:
          NODE_ENV: production

      - name: Compress workspace
        run: |
          mkdir -p .deploy
          tar --exclude=node_modules --exclude=.git --exclude=dist --exclude=.deploy -czf .deploy/workspace.tar.gz .
          ls -lh .deploy/workspace.tar.gz

      - name: Upload to Server via SCP
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: ".deploy/workspace.tar.gz"
          target: "C:\\web3pro_tmp"
          strip_components: 1

      - name: Deploy on server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script_stop: true
          script: >
            cmd.exe /c "(if not exist C:\web3pro mkdir C:\web3pro)
            && (if not exist C:\web3pro_tmp\workspace.tar.gz (echo Missing C:\web3pro_tmp\workspace.tar.gz && exit /b 1))
            && cd /d C:\web3pro
            && echo Extracting workspace...
            && tar -xzf C:\web3pro_tmp\workspace.tar.gz --force-local
            && powershell.exe -NoProfile -ExecutionPolicy Bypass -File C:\web3pro\scripts\deploy.ps1"

      - name: Inspect runtime on server
        continue-on-error: true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script_stop: false
          script: >
            powershell.exe -NoProfile -ExecutionPolicy Bypass -File "C:\web3pro\scripts\diagnose-runtime.ps1"

      - name: Purge Cloudflare cache
        run: |
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | python3 -c "import sys,json; r=json.load(sys.stdin); print('Cloudflare cache purged OK' if r.get('success') else 'Cache purge failed: ' + str(r))"

      - name: Verify deployment
        run: |
          sleep 35
          pwsh -NoProfile -File ./scripts/smoke-site.ps1 -BaseUrl "https://get8.pro"
